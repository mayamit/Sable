    <text x="212" y="871" text-anchor="middle" font-size="10.5" fill="#6B7280">support center</text>

    <rect x="315" y="838" width="185" height="40" rx="8" fill="#ffffff" stroke="#9DB4CC" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="407" y="856" text-anchor="middle" class="p2">For AI assistants</text>
    <text x="407" y="871" text-anchor="middle" font-size="10.5" fill="#6B7280">answer-engine / llms.txt</text>

    <rect x="510" y="838" width="140" height="40" rx="8" fill="#ffffff" stroke="#9DB4CC" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="580" y="856" text-anchor="middle" class="p2">Use-case pages</text>
    <text x="580" y="871" text-anchor="middle" font-size="10.5" fill="#6B7280">per persona</text>
