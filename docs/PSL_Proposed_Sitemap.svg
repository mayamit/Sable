    <text x="407" y="821" text-anchor="middle" font-size="10.5" fill="#6B7280">about · manifesto</text>

    <rect x="510" y="788" width="185" height="40" rx="8" fill="#ffffff" stroke="#9DB4CC" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="602" y="806" text-anchor="middle" class="p2">Vision / What&#8217;s next</text>
    <text x="602" y="821" text-anchor="middle" font-size="10.5" fill="#6B7280">undated — not a dated roadmap</text>

    <rect x="120" y="838" width="185" height="40" rx="8" fill="#ffffff" stroke="#9DB4CC" stroke-width="1.4" stroke-dasharray="5 4"/>
