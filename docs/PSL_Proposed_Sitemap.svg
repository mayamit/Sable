    <rect x="185" y="298" width="245" height="48" rx="8" fill="#EAF1F8" stroke="#2E75B6" stroke-width="1.5"/>
    <text x="199" y="318" class="p1">Lenses</text>
    <text x="199" y="336" class="p1s">Overview — the surfaces you touch</text>
    <!-- children -->
    <line x1="300" y1="346" x2="300" y2="372" stroke="#C3D2E2" stroke-width="1.5"/>
    <line x1="300" y1="372" x2="470" y2="372" stroke="#C3D2E2" stroke-width="1.5"/>
    <rect x="470" y="356" width="180" height="34" rx="7" fill="#ffffff" stroke="#9DB4CC" stroke-width="1.3"/>
