    <line x1="300" y1="372" x2="300" y2="410" stroke="#C3D2E2" stroke-width="1.5"/>
    <line x1="300" y1="410" x2="470" y2="410" stroke="#C3D2E2" stroke-width="1.5"/>
    <rect x="470" y="394" width="180" height="34" rx="7" fill="#ffffff" stroke="#9DB4CC" stroke-width="1.3"/>
    <text x="482" y="416" class="leaf">Reasoning lens</text>
    <text x="662" y="390" font-size="11.5" fill="#6B7280">individual lens pages</text>
    <text x="662" y="406" font-size="11.5" fill="#6B7280">= Phase 2 (SEO/depth)</text>
  </g>
