<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1020" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title{font-size:30px;font-weight:700;fill:#1F3A5F}
      .sub{font-size:15px;fill:#6B7280}
      .home{font-size:19px;font-weight:700;fill:#ffffff}
      .p1{font-size:15px;font-weight:700;fill:#12314f}
      .p1s{font-size:11.5px;fill:#33506b}
      .p2{font-size:14px;font-weight:700;fill:#33506b}
      .leaf{font-size:12.5px;font-weight:700;fill:#1F3A5F}
      .lg{font-size:13px;fill:#374151}
      .sec{font-size:15px;font-weight:700;fill:#1F3A5F}
      .anat{font-size:12.5px;fill:#12314f}
      .anatn{font-size:12.5px;font-weight:700;fill:#2E75B6}
    </style>
    <linearGradient id="homeg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E5E8F"/><stop offset="1" stop-color="#1F3A5F"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="1020" fill="#ffffff"/>
  <text x="60" y="58" class="title">PSL — Proposed Website Sitemap &amp; Homepage Anatomy</text>
  <text x="60" y="84" class="sub">Phase 1 launches the differentiation-carrying pages; Phase 2 grows into the full multi-page architecture without changing URLs.</text>
  <line x1="60" y1="100" x2="1380" y2="100" stroke="#2E75B6" stroke-width="2"/>

  <!-- ===================== LEFT: SITEMAP TREE ===================== -->
  <!-- Home node -->
  <rect x="120" y="130" width="230" height="60" rx="10" fill="url(#homeg)"/>
  <text x="235" y="160" text-anchor="middle" class="home">Home</text>
  <text x="235" y="180" text-anchor="middle" font-size="12" fill="#cfe0f0">psl.com — full narrative</text>

  <!-- trunk down -->
  <line x1="235" y1="190" x2="235" y2="230" stroke="#9DB4CC" stroke-width="2"/>
  <line x1="150" y1="230" x2="320" y2="230" stroke="#9DB4CC" stroke-width="2"/>
  <!-- vertical rail for the primary pages -->
  <line x1="150" y1="230" x2="150" y2="815" stroke="#9DB4CC" stroke-width="2"/>

  <!-- Primary Phase-1 pages -->
  <!-- helper positions -->
