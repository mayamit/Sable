  <text x="855" y="152" class="sec">Homepage anatomy (top → bottom)</text>
  <text x="855" y="172" class="sub">The canonical AI-product stack, tuned to PSL</text>

  <!-- stack rows -->
  <!-- each row: number chip + label + note -->
  <g>
    <!-- row template values -->
    <!-- 1 -->
    <rect x="855" y="188" width="470" height="46" rx="8" fill="#1F3A5F"/>
    <circle cx="884" cy="211" r="14" fill="#ffffff"/><text x="884" y="216" text-anchor="middle" font-size="14" font-weight="700" fill="#1F3A5F">1</text>
    <text x="910" y="207" font-size="14" font-weight="700" fill="#ffffff">Nav</text>
    <text x="910" y="224" font-size="11.5" fill="#cfe0f0">How it works · Lenses · Privacy · Home Server · Pricing · CTA</text>

    <!-- 2 Hero -->
    <rect x="855" y="240" width="470" height="52" rx="8" fill="#2E5E8F"/>
    <circle cx="884" cy="266" r="14" fill="#ffffff"/><text x="884" y="271" text-anchor="middle" font-size="14" font-weight="700" fill="#1F3A5F">2</text>
    <text x="910" y="262" font-size="14" font-weight="700" fill="#ffffff">Hero — outcome headline</text>
    <text x="910" y="280" font-size="11.5" fill="#e3eef8">“An AI that actually knows you.” + product visual + CTA</text>

    <!-- rows 3-12 light -->
    <g font-size="13.5">
      <!-- 3 -->
      <rect x="855" y="298" width="470" height="34" rx="7" fill="#EAF1F8" stroke="#C3D2E2"/>
      <circle cx="884" cy="315" r="12" fill="#2E75B6"/><text x="884" y="319" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
      <text x="908" y="319" class="anat"><tspan font-weight="700">Problem</tspan> — “Today’s AI forgets you every time.”</text>

      <!-- 4 -->
      <rect x="855" y="336" width="470" height="34" rx="7" fill="#EAF1F8" stroke="#C3D2E2"/>
      <circle cx="884" cy="353" r="12" fill="#2E75B6"/><text x="884" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>
      <text x="908" y="357" class="anat"><tspan font-weight="700">The idea</tspan> — Foundation diagram: resolve → hold → reuse</text>

      <!-- 5 -->
      <rect x="855" y="374" width="470" height="34" rx="7" fill="#EAF1F8" stroke="#C3D2E2"/>
      <circle cx="884" cy="391" r="12" fill="#2E75B6"/><text x="884" y="395" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">5</text>
      <text x="908" y="395" class="anat"><tspan font-weight="700">The lenses</tspan> — Communications &amp; Reasoning, with screenshots</text>

      <!-- 6 -->
      <rect x="855" y="412" width="470" height="34" rx="7" fill="#EAF1F8" stroke="#C3D2E2"/>
      <circle cx="884" cy="429" r="12" fill="#2E75B6"/><text x="884" y="433" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">6</text>
      <text x="908" y="433" class="anat"><tspan font-weight="700">Works over your apps</tspan> — connectors; apps stay source of record</text>

      <!-- 7 highlight -->
      <rect x="855" y="450" width="470" height="34" rx="7" fill="#DDEBD6" stroke="#4B8B3B" stroke-width="1.6"/>
      <circle cx="884" cy="467" r="12" fill="#4B8B3B"/><text x="884" y="471" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">7</text>
      <text x="908" y="471" class="anat"><tspan font-weight="700">Trust by design ★</tspan> — gated writes · source traces · audit</text>

      <!-- 8 highlight -->
      <rect x="855" y="488" width="470" height="34" rx="7" fill="#DDEBD6" stroke="#4B8B3B" stroke-width="1.6"/>
      <circle cx="884" cy="505" r="12" fill="#4B8B3B"/><text x="884" y="509" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">8</text>
      <text x="908" y="509" class="anat"><tspan font-weight="700">Your data, your place ★</tspan> — Cloud vs Home-Server tiers</text>

      <!-- 9 -->
      <rect x="855" y="526" width="470" height="34" rx="7" fill="#EAF1F8" stroke="#C3D2E2"/>
      <circle cx="884" cy="543" r="12" fill="#2E75B6"/><text x="884" y="547" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">9</text>
      <text x="908" y="547" class="anat"><tspan font-weight="700">Credibility</tspan> — founder / early-user proof, press badges</text>

      <!-- 10 -->
      <rect x="855" y="564" width="470" height="34" rx="7" fill="#EAF1F8" stroke="#C3D2E2"/>
      <circle cx="884" cy="581" r="12" fill="#2E75B6"/><text x="884" y="585" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">10</text>
      <text x="908" y="585" class="anat"><tspan font-weight="700">Pricing</tspan> — $100/mo, two tiers, one toggle</text>

      <!-- 11 -->
      <rect x="855" y="602" width="470" height="34" rx="7" fill="#EAF1F8" stroke="#C3D2E2"/>
      <circle cx="884" cy="619" r="12" fill="#2E75B6"/><text x="884" y="623" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">11</text>
      <text x="908" y="623" class="anat"><tspan font-weight="700">FAQ</tspan> — “Is this a chatbot?” · “What can it see?”</text>

      <!-- 12 -->
      <rect x="855" y="640" width="470" height="34" rx="7" fill="#1F3A5F"/>
      <circle cx="884" cy="657" r="12" fill="#ffffff"/><text x="884" y="661" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1F3A5F">12</text>
      <text x="908" y="661" font-size="13.5" fill="#ffffff"><tspan font-weight="700">Final CTA + footer</tspan> — repeat promise · 4-column footer</text>
    </g>
  </g>

  <!-- framing principle callout -->
  <rect x="855" y="700" width="470" height="132" rx="10" fill="#FBF7EC" stroke="#D8C89A" stroke-width="1.4"/>
  <text x="875" y="726" font-size="14" font-weight="700" fill="#7A5B12">Framing principle</text>
  <text x="875" y="750" font-size="12.5" fill="#4b4636">Lead with the outcome, not the architecture.</text>
  <text x="875" y="770" font-size="12.5" fill="#4b4636">Show the surface (real screenshots), not a prompt box.</text>
  <text x="875" y="790" font-size="12.5" fill="#4b4636">Sell memory and trust together — they are one story.</text>
  <text x="875" y="810" font-size="12.5" fill="#4b4636">Contrast openly: “a packaged product, not a chatbot.”</text>

  <text x="60" y="988" class="sub">PSL — Website Research · Proposed IA · July 2026 · companion to PSL_Website_Research_Homepage_IA.docx</text>
</svg>
