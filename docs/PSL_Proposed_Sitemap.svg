    <rect x="120" y="918" width="26" height="16" rx="4" fill="#EAF1F8" stroke="#2E75B6" stroke-width="1.5"/>
    <text x="154" y="931" class="lg">Phase 1 page</text>
    <rect x="270" y="918" width="26" height="16" rx="4" fill="#DDEBD6" stroke="#4B8B3B" stroke-width="2"/>
    <text x="304" y="931" class="lg">★ Differentiator (ship first)</text>
    <rect x="520" y="918" width="26" height="16" rx="4" fill="#ffffff" stroke="#9DB4CC" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="554" y="931" class="lg">Phase 2 page</text>
  </g>

  <!-- Divider between panels -->
  <line x1="810" y1="130" x2="810" y2="960" stroke="#E2E8F0" stroke-width="2"/>

